name: Deploy Diet Tracking App to EC2

on:
  push:
    branches:
      - main
      - Development

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Tests
        run: |
          cd backend
          npm test
        env:
          JWT_SECRET: test-secret-key-for-github-actions
          MONGO_URI: mongodb://localhost:27017/diet-tracker-test
          NODE_ENV: test

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npx react-scripts build

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            cd /home/ubuntu/diet-tracker-app || exit 1
            git pull origin ${{ github.ref_name }}
            cd backend
            npm install
            pm2 restart diet-tracker-backend || pm2 start server.js --name diet-tracker-backend
            pm2 save
            cd ../frontend
            sudo rm -rf /var/www/html/*
            sudo cp -r build/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo systemctl restart nginx
            echo "✅ Deployment complete!"